<div class="flex items-center justify-between py-2.5 border-b border-ink-200 gap-3 last:border-b-0 last:pb-0 first:pt-0.5">
  <div class="flex flex-col gap-0.5">
    <div class="font-mono text-base font-semibold text-ink-950 tracking-wide">{{ ticker }}</div>
    @if (name) {
      <div class="text-xs text-ink-500">{{ name }}</div>
    }
  </div>
  <div class="flex items-center gap-2 shrink-0">
    @if (price) {
      <span class="font-mono text-base text-ink-800 font-semibold tracking-tight">{{ price }}</span>
    }
    <ng-content></ng-content>
  </div>
</div>
