<div class="border-[1.5px] border-ink-200 rounded-2xl overflow-hidden bg-white shadow-sm animate-[card-in_0.22s_ease]">
  <!-- Header -->
  <div class="flex items-center gap-2.5 px-4 py-3 border-b border-ink-200 bg-ink-50/50">
    <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-teal-100 to-teal-200 flex items-center justify-center text-sm">📊</div>
    <div class="flex-1">
      <div class="text-sm font-bold text-ink-950">{{ sectorLabel }} — Sector Pulse</div>
    </div>
    <span class="text-[10px] text-ink-400 font-medium">Apr 14, 2026</span>
  </div>

  <!-- Body -->
  <div class="p-4">
    <!-- Stat Grid -->
    <div class="grid grid-cols-3 gap-2 mb-4">
      <div class="flex flex-col items-center p-3 bg-ink-50 rounded-xl border border-ink-100">
        <div class="text-[10px] text-ink-500 font-medium mb-1">Signal</div>
        <div class="text-sm font-bold" [class]="signalColor">{{ sectorData.sig }}</div>
        <div class="text-[10px] text-ink-400 mt-0.5">{{ signalLabel }}</div>
      </div>
      <div class="flex flex-col items-center p-3 bg-ink-50 rounded-xl border border-ink-100">
        <div class="text-[10px] text-ink-500 font-medium mb-1">Today</div>
        <div class="text-sm font-bold" [class]="signalColor">{{ sectorData.chg }}</div>
        <div class="text-[10px] text-ink-400 mt-0.5">vs prior close</div>
      </div>
      <div class="flex flex-col items-center p-3 bg-ink-50 rounded-xl border border-ink-100">
        <div class="text-[10px] text-ink-500 font-medium mb-1">Stocks</div>
        <div class="text-sm font-bold text-ink-950">{{ sectorData.stocks }}</div>
        <div class="text-[10px] text-ink-400 mt-0.5">in your universe</div>
      </div>
    </div>

    <!-- Sector leaders -->
    <div class="text-[10px] text-ink-500 font-semibold uppercase tracking-wider mb-2">Sector leaders</div>
    @for (leader of sectorData.leaders; track leader) {
      <div class="flex items-center justify-between py-2.5 border-b border-ink-100 last:border-b-0">
        <span class="font-mono text-xs font-bold text-ink-950">{{ leader }}</span>
        <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold bg-blue-50 text-blue-700 border border-blue-200 cursor-pointer hover:bg-blue-100">VIEW</span>
      </div>
    }
  </div>
</div>
