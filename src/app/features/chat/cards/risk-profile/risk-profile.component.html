<div class="border-[1.5px] border-ink-200 rounded-2xl overflow-hidden bg-white shadow-sm animate-[card-in_0.22s_ease]">
  <div class="flex items-center gap-2.5 px-4 py-3 border-b border-ink-200 bg-ink-50/50 relative">
    <div class="absolute left-0 top-2 bottom-2 w-[3.5px] rounded-r-sm bg-gradient-to-b from-gold-400 to-teal-600"></div>
    <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-teal-50 to-teal-100 border-[1.5px] border-teal-200 flex items-center justify-center text-sm shadow-[0_1px_4px_rgba(5,150,105,0.12)]">△</div>
    <div class="flex-1">
      <div class="font-serif text-[15px] font-semibold text-ink-950 tracking-tight">Risk Profile</div>
    </div>
    <span class="text-[10px] text-ink-400 font-medium bg-ink-50 border border-ink-200 rounded-full px-2.5 py-0.5 uppercase tracking-widest">Assessed Jan 12, 2026</span>
  </div>

  <div class="p-4">
    <div class="flex items-center gap-3 p-3 bg-ink-50 rounded-[10px] border-[1.5px] border-ink-200 mb-4">
      <div class="w-[46px] h-[46px] rounded-full bg-teal-50 border-[1.5px] border-teal-200 flex items-center justify-center shrink-0">
        <span class="text-[9px] font-bold text-teal-800 text-center leading-tight tracking-wide">MOD<br>GROW</span>
      </div>
      <div>
        <div class="font-serif text-[15px] font-medium text-ink-950">Moderate Growth</div>
        <div class="text-[11px] text-ink-500 font-normal mt-0.5">Balanced risk · medium-term horizon</div>
      </div>
    </div>

    @for (row of rows; track row.label) {
      <div class="flex items-center justify-between py-[11px] border-b border-ink-100 last:border-b-0 last:pb-0 first:pt-0.5 gap-3">
        <div class="font-mono text-[13px] font-semibold text-ink-950 tracking-[0.02em]">{{ row.label }}</div>
        <span class="inline-flex items-center px-2.5 py-[3px] rounded-full text-[11px] font-bold tracking-[0.02em] whitespace-nowrap uppercase border"
              [class]="row.badgeClass">{{ row.badge }}</span>
      </div>
    }
  </div>
</div>
