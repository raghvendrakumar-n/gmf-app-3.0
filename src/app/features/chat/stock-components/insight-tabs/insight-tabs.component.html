<div class="flex gap-1 p-1 bg-ink-50 rounded-lg border-[1.5px] border-ink-200 mb-3.5">
  @for (tab of tabs; track tab; let i = $index) {
    <button
      class="flex-1 px-3 py-2 rounded-md border-none bg-transparent text-sm font-medium text-ink-500 cursor-pointer transition-all duration-150"
      [class.bg-white]="i === activeIndex"
      [class.text-teal-700]="i === activeIndex"
      [class.font-bold]="i === activeIndex"
      [class.shadow-sm]="i === activeIndex"
      (click)="activeIndex = i">{{ tab }}</button>
  }
</div>
