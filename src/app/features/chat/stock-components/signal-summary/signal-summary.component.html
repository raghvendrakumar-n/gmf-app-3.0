<div class="py-3">
  <div class="text-sm font-bold text-ink-950 mb-2.5">Signal Summary</div>
  <div class="grid grid-cols-2 gap-2">
    @for (signal of signals; track $index) {
      <div class="flex justify-between items-center px-3 py-2 bg-ink-50 rounded-sm border border-ink-200">
        <span class="text-xs text-ink-500">{{ signal.label }}</span>
        <span class="text-sm font-bold" [ngClass]="{'text-teal-600': signal.direction === 'bullish', 'text-danger': signal.direction === 'bearish', 'text-ink-500': signal.direction === 'neutral'}">{{ signal.value }}</span>
      </div>
    }
  </div>
</div>
