<div class="py-3">
  <div class="text-sm font-bold text-ink-950 mb-2.5">Personal Alignment</div>
  @for (item of items; track $index) {
    <div class="flex items-center gap-2.5 py-2 border-b border-ink-200 last:border-b-0">
      <span class="text-base">{{ item.icon }}</span>
      <span class="flex-1 text-sm text-ink-800">{{ item.label }}</span>
      <span class="text-sm font-bold" [ngClass]="{'text-teal-600': item.sentiment === 'positive', 'text-danger': item.sentiment === 'negative', 'text-ink-500': item.sentiment === 'neutral'}">{{ item.value }}</span>
    </div>
  }
</div>
