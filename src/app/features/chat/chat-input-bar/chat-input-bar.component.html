<div class="px-4 py-3 border-t border-ink-200 bg-white shrink-0">
  <div class="flex items-center gap-2 bg-ink-50 border border-ink-200 rounded-[26px] pl-[18px] pr-[5px] py-1 transition-all focus-within:border-teal-600 focus-within:shadow-[0_0_0_3px_rgba(26,127,90,0.1)] focus-within:bg-white">
    <textarea
      class="flex-1 border-none bg-transparent font-sans text-base text-ink-900 outline-none py-2 resize-none leading-relaxed max-h-[100px] font-medium min-w-0 placeholder:text-ink-400 placeholder:font-normal"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      rows="1"
      placeholder="Ask Leo about any stock, the market, your portfolio…"
    ></textarea>
    <button
      class="w-9 h-9 rounded-full border-none cursor-pointer flex items-center justify-center shrink-0 transition-all hover:scale-105"
      [ngClass]="isListening ? 'bg-red-500 shadow-[0_2px_8px_rgba(220,38,38,0.3)] animate-pulse' : 'bg-ink-200 hover:bg-ink-300'"
      (click)="toggleMic()"
      [title]="isListening ? 'Stop listening' : 'Voice input'">
      <svg class="w-[15px] h-[15px]" [class]="isListening ? 'fill-white' : 'fill-ink-600'" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <button class="w-9 h-9 rounded-full bg-gradient-to-br from-teal-600 to-teal-700 border-none cursor-pointer flex items-center justify-center shrink-0 shadow-[0_2px_8px_rgba(26,127,90,0.3)] transition-all hover:opacity-90 hover:scale-105" (click)="handleSend()">
      <svg class="w-[15px] h-[15px] fill-white" viewBox="0 0 24 24"><path d="M22 2 11 13M22 2 15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
  <div class="flex items-center justify-center gap-2 text-[10px] text-ink-500 mt-[7px]">
    <span>Enter to send · Shift+Enter for new line</span>
    <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full border cursor-pointer"
      [ngClass]="{
        'border-teal-200 bg-teal-50 text-teal-700': aiStatus === 'ready',
        'border-amber-200 bg-amber-50 text-amber-700': aiStatus === 'loading',
        'border-ink-200 bg-ink-50 text-ink-500': aiStatus === 'idle',
        'border-red-200 bg-red-50 text-red-700': aiStatus === 'error'
      }"
      [title]="aiErrorMsg">
      <span class="w-1.5 h-1.5 rounded-full"
        [ngClass]="{
          'bg-teal-500': aiStatus === 'ready',
          'bg-amber-500 animate-pulse': aiStatus === 'loading',
          'bg-ink-400': aiStatus === 'idle',
          'bg-red-500': aiStatus === 'error'
        }"></span>
      @if (aiStatus === 'ready') { AI Ready }
      @if (aiStatus === 'loading') { AI Loading… }
      @if (aiStatus === 'idle') { AI Offline }
      @if (aiStatus === 'error') { AI Error }
    </span>
  </div>
</div>
