<div class="fixed inset-0 z-[200] items-center justify-center backdrop-blur-sm bg-ink-950/60" 
     [class.hidden]="!isOpen" [class.flex]="isOpen">
  <div class="bg-white rounded-3xl shadow-modal w-[400px] max-w-[calc(100vw-40px)] overflow-hidden animate-[modal-in_0.28s_cubic-bezier(0.34,1.56,0.64,1)]">
    
    <!-- Header -->
    <div class="px-8 pt-8 pb-6 text-center border-b border-ink-200 bg-gradient-to-b from-teal-50 to-white">
      <div class="flex items-center justify-center gap-2.5 mb-5">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-600 to-teal-800 flex items-center justify-center shadow-teal">
          <span class="font-serif text-[22px] text-white leading-none">L</span>
        </div>
        <span class="font-serif text-[22px] text-ink-950">StockIQ</span>
      </div>
      <div class="font-serif text-xl text-ink-950 mb-1">Welcome back</div>
      <div class="text-[13px] text-ink-500">Sign in to continue with Leo, your AI analyst.</div>
    </div>

    <!-- Body -->
    <div class="px-7 pt-6 pb-7">
      <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl border-[1.5px] border-ink-200 bg-white font-sans text-sm font-semibold text-ink-950 cursor-pointer transition-all duration-150 mb-2.5 shadow-sm hover:border-ink-300 hover:bg-ink-50 hover:-translate-y-px"
              [class.opacity-70]="loadingProvider === 'apple'" [class.pointer-events-none]="loadingProvider === 'apple'"
              (click)="doOAuthLogin('apple')">
        <span class="w-[22px] h-[22px] flex-shrink-0 flex items-center justify-center text-base"><svg width="16" height="16" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5c0 26.2 4.8 53.3 14.4 81.2 12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-62.1 24-72.5-24 1.3-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg></span>
        <span class="flex-1 text-left">Continue with Apple</span>
        <span class="text-base text-ink-500">›</span>
      </button>

      <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl border-[1.5px] border-ink-200 bg-white font-sans text-sm font-semibold text-ink-950 cursor-pointer transition-all duration-150 mb-2.5 shadow-sm hover:border-ink-300 hover:bg-ink-50 hover:-translate-y-px"
              [class.opacity-70]="loadingProvider === 'google'" [class.pointer-events-none]="loadingProvider === 'google'"
              (click)="doOAuthLogin('google')">
        <span class="w-[22px] h-[22px] flex-shrink-0 flex items-center justify-center font-bold text-base">G</span>
        <span class="flex-1 text-left">Continue with Google</span>
        <span class="text-base text-ink-500">›</span>
      </button>

      <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl border-[1.5px] border-ink-200 bg-white font-sans text-sm font-semibold text-ink-950 cursor-pointer transition-all duration-150 mb-2.5 shadow-sm hover:border-ink-300 hover:bg-ink-50 hover:-translate-y-px"
              [class.opacity-70]="loadingProvider === 'linkedin'" [class.pointer-events-none]="loadingProvider === 'linkedin'"
              (click)="doOAuthLogin('linkedin')">
        <span class="w-[22px] h-[22px] flex-shrink-0 flex items-center justify-center font-bold text-blue-700">in</span>
        <span class="flex-1 text-left">Continue with LinkedIn</span>
        <span class="text-base text-ink-500">›</span>
      </button>

      <div class="flex items-center gap-3 my-4 text-[11px] text-ink-500 font-medium">
        <span class="flex-1 h-px bg-ink-200"></span>or<span class="flex-1 h-px bg-ink-200"></span>
      </div>

      <button class="w-full py-3 bg-transparent text-ink-500 border-[1.5px] border-ink-200 rounded-lg font-sans text-[13px] font-medium cursor-pointer transition-all duration-150 hover:border-ink-300 hover:text-ink-800 hover:bg-ink-50"
              (click)="doGuestLogin()">
        Browse as guest — limited access
      </button>
    </div>

    <!-- Footer -->
    <div class="px-7 py-3.5 text-center text-[11px] text-ink-500 leading-relaxed border-t border-ink-200 bg-ink-50">
      By signing in you agree to Guide My Folio's
      <a href="#" class="text-teal-600 no-underline font-medium">Terms of Service</a> and
      <a href="#" class="text-teal-600 no-underline font-medium">Privacy Policy</a>.
    </div>
  </div>
</div>
